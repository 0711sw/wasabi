name: Rust CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
  push:
    tags:
      - '*'
jobs:
  build:
    name: Rust Checks
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache Cargo registry and build
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-features

      - name: Run audit
        # RUSTSEC-2026-0194 (quick-xml quadratic runtime on duplicate attributes)
        # RUSTSEC-2026-0195 (quick-xml unbounded namespace allocation)
        # Both are transitive via typst → citationberg → quick-xml 0.38.4. Only
        # exploitable when parsing untrusted XML, which we do not. Waiting on
        # typst to bump quick-xml to >=0.41.
        run: cargo audit --ignore RUSTSEC-2026-0194 --ignore RUSTSEC-2026-0195